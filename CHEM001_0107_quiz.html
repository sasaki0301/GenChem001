<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson 7 Quiz - Significant Figures and Scientific Notation</title>
  <style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #e8f9f1, #f7faff);
    margin: 0;
    padding: 40px 20px;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .quiz-container {
    background: #ffffff;
    border-radius: 18px;
    padding: 40px 50px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
    width: 95%;
    max-width: 850px;
    text-align: center;
  }
  h2 {
    color: #136f63;
    margin-bottom: 25px;
    font-size: 1.8em;
  }
  .progress-wrapper {
    background: #e9f5ef;
    border-radius: 8px;
    height: 14px;
    width: 100%;
    margin-bottom: 25px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, #136f63, #2b7de9);
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    text-align: right;
    font-size: 0.95em;
    color: #174ea6;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .question {
    font-size: 1.3em;
    font-weight: 600;
    color: #174ea6;
    margin-bottom: 20px;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .choice {
    background: #e8ecf8;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-size: 1.05em;
    transition: all 0.2s ease;
  }
  .choice:hover { background: #d3dbf8; transform: translateY(-2px); }
  .choice.correct { background: #136f63; color: #fff; }
  .choice.incorrect { background: #e57373; color: #fff; }
  .explanation {
    background: #eef3ff;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    margin-bottom: 20px;
    font-size: 0.95em;
    color: #174ea6;
    display: none;
  }
  .next-btn {
    background: #136f63;
    color: #fff;
    border: none;
    padding: 12px 26px;
    border-radius: 10px;
    font-size: 1.05em;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }
  .next-btn:hover { background: #0f5b52; }
  .result {
    font-size: 1.4em;
    font-weight: bold;
    color: #174ea6;
    margin-top: 20px;
  }
  .stars {
    font-size: 2.5em;
    margin-top: 10px;
    margin-bottom: 5px;
  }
  .quiz-nav {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .quiz-btn {
    background: #e8ecf8;
    color: #174ea6;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.95em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .quiz-btn:hover { background: #d3dbf8; transform: translateY(-2px); }
  .quiz-btn.primary { background: #136f63; color: #fff; }
  .quiz-btn.primary:hover { background: #0f5b52; }
  @media (max-width: 600px) {
    .quiz-container { padding: 25px; }
    .question { font-size: 1.1em; }
    .stars { font-size: 2em; }
  }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h2>Significant Figures and Scientific Notation – Quiz</h2>
    <div class="progress-text" id="progressText">Question 1 of 10</div>
    <div class="progress-wrapper"><div class="progress-bar" id="progressBar"></div></div>

    <div id="quizBox"></div>
    <button id="nextBtn" class="next-btn" style="display:none;">Next</button>
  </div>

<script>
const quizData = [

{q:"How many significant figures are in 0.00450?",c:["2","3","4","5"],a:1,e:"Leading zeros are not significant; 4, 5, and the trailing zero are significant → 3 sig figs."},

{q:"Which number has 3 significant figures?",c:["0.00340","3400","3.4 × 10³","0.034"],a:0,e:"Trailing zero after decimal is significant → 0.00340 has 3 sig figs: 3,4,0 "},

{q:"How many significant figures are in 3050?",c:["2","3","4","5"],a:1,e:"The zero between digits is significant, but trailing zero without decimal is ambiguous → typically 3 sig figs."},

{q:"Which number has the greatest precision?",c:["2.1","2.10","2.100","2"],a:2,e:"More significant figures indicate greater precision."},

{q:"What is the result of 2.5 × 3.42 using correct significant figures?",c:["8.55","8.6","8.550","9"],a:1,e:"Least sig figs = 2 → 8.55 rounds to 8.6."},

{q:"What is the result of 12.11 + 0.3 with proper significant figures?",c:["12.41","12.4","12.410","12"],a:1,e:"Addition rule: least decimal places → 12.4."},

{q:"Which number is written correctly in scientific notation?",c:["45 × 10²","4.5 × 10²","0.45 × 10³","450 × 10¹"],a:1,e:"Coefficient must be between 1 and 10."},

{q:"Convert 0.00067 to scientific notation.",c:["6.7 × 10⁻⁴","6.7 × 10⁻³","6.7 × 10⁴","0.67 × 10⁻³"],a:0,e:"Move decimal 4 places → 6.7 × 10⁻⁴."},

{q:"Convert 3.2 × 10⁵ to standard form.",c:["32000","320000","3200000","3200"],a:1,e:"Move decimal 5 places right → 320000."},

{q:"Which rule applies for multiplication and division?",c:["Least decimal places","Least significant figures","Most significant figures","No rule"],a:1,e:"Multiplication/division uses least sig figs."},

{q:"Which number has 3 significant figures?",c:["0.00234","2340","2.340 × 10²","0.0203"],a:3,e:"0.0203 → 2,0,3 are significant → 3 sig figs."},

{q:"Why are significant figures important?",c:["To make numbers larger","To reflect measurement precision","To simplify calculations","To remove units"],a:1,e:"They indicate how precise a measurement is."},

{q:"Round 0.05678 to 3 significant figures.",c:["0.0568","0.057","0.0567","0.05678"],a:0,e:"Keep 3 sig figs → 5,6,7 → next digit 8 rounds up → 0.0568."},

{q:"Which statement about zeros is correct?",c:["All zeros are significant","Leading zeros are significant","Trailing zeros are always significant","Zeros between digits are significant"],a:3,e:"Zeros between nonzero digits are always significant."},

{q:"Which value is least precise?",c:["5.00","5.0","5","5.000"],a:2,e:"Fewer significant figures indicate lower precision."}

];

let current = 0, score = 0;
const quizBox = document.getElementById("quizBox");
const nextBtn = document.getElementById("nextBtn");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");

function showQuestion() {
  const q = quizData[current];
  updateProgress();
  quizBox.innerHTML = `
    <div class='question'>${q.q}</div>
    <div class='choices'></div>
    <div class='explanation' id='explanation'></div>
  `;
  const choicesContainer = quizBox.querySelector(".choices");
  q.c.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = choice;
    btn.addEventListener("click", () => selectChoice(i));
    choicesContainer.appendChild(btn);
  });
  nextBtn.style.display = "none";
}

function selectChoice(i) {
  const q = quizData[current];
  const explanationBox = document.getElementById("explanation");
  document.querySelectorAll(".choice").forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === q.a) btn.classList.add("correct");
    if (idx === i && idx !== q.a) btn.classList.add("incorrect");
  });
  if (i === q.a) score++;
  explanationBox.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
  explanationBox.style.display = "block";
  nextBtn.style.display = "inline-block";
}

nextBtn.addEventListener("click", () => {
  current++;
  if (current < quizData.length) showQuestion(); else showResult();
});

function updateProgress() {
  const percent = (current / quizData.length) * 100;
  progressBar.style.width = percent + "%";
  progressText.textContent = `Question ${current + 1} of ${quizData.length}`;
}

function getStarRating(percent) {
  if (percent === 100) return "⭐️⭐️⭐️";
  else if (percent >= 90) return "⭐️⭐️☆";
  else if (percent >= 80) return "⭐️☆☆";
  else return "☆☆☆";
}

function showResult() {
  progressBar.style.width = "100%";
  progressText.textContent = "Quiz Completed";
  const percent = Math.round((score / quizData.length) * 100);
  const passed = percent >= 80;

  quizBox.innerHTML = `
    <div class='stars'>${getStarRating(percent)}</div>
    <div class='result'>You scored ${score}/${quizData.length} (${percent}%)</div>
    <div class='quiz-nav'>
      <button class='quiz-btn' id='backBtn'>⬅ Back</button>
      <button class='quiz-btn' id='retryBtn'>🔁 Retry</button>
      <button class='quiz-btn primary' id='nextLessonBtn' ${passed ? "" : "disabled"}>➡ Next Lesson</button>
    </div>
  `;

  nextBtn.style.display = "none";
  window.parent.postMessage({ type: "quizResult", score: percent, passed }, "*");

  document.getElementById("retryBtn").addEventListener("click", retryQuiz);
  document.getElementById("backBtn").addEventListener("click", () => window.parent.postMessage({ type: "quizBack" }, "*"));
  document.getElementById("nextLessonBtn").addEventListener("click", () => { if (passed) window.parent.postMessage({ type: "quizNextLesson" }, "*"); });
}

function retryQuiz() { current = 0; score = 0; showQuestion(); }

showQuestion();
</script>
</body>
</html>
