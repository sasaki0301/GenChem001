<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson 3 Quiz - Gathering Quantitative Figures</title>
  <style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #e8f9f1, #f7faff);
    margin: 0;
    padding: 40px 20px;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .quiz-container {
    background: #ffffff;
    border-radius: 18px;
    padding: 40px 50px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
    width: 95%;
    max-width: 850px;
    text-align: center;
  }
  h2 {
    color: #136f63;
    margin-bottom: 25px;
    font-size: 1.8em;
  }
  .progress-wrapper {
    background: #e9f5ef;
    border-radius: 8px;
    height: 14px;
    width: 100%;
    margin-bottom: 25px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, #136f63, #2b7de9);
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    text-align: right;
    font-size: 0.95em;
    color: #174ea6;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .question {
    font-size: 1.3em;
    font-weight: 600;
    color: #174ea6;
    margin-bottom: 20px;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .choice {
    background: #e8ecf8;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    font-size: 1.05em;
    transition: all 0.2s ease;
  }
  .choice:hover { background: #d3dbf8; transform: translateY(-2px); }
  .choice.correct { background: #136f63; color: #fff; }
  .choice.incorrect { background: #e57373; color: #fff; }
  .explanation {
    background: #eef3ff;
    border-radius: 10px;
    padding: 14px 18px;
    text-align: left;
    margin-bottom: 20px;
    font-size: 0.95em;
    color: #174ea6;
    display: none;
  }
  .next-btn {
    background: #136f63;
    color: #fff;
    border: none;
    padding: 12px 26px;
    border-radius: 10px;
    font-size: 1.05em;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }
  .next-btn:hover { background: #0f5b52; }
  .result {
    font-size: 1.4em;
    font-weight: bold;
    color: #174ea6;
    margin-top: 20px;
  }
  .stars {
    font-size: 2.5em;
    margin-top: 10px;
    margin-bottom: 5px;
  }
  .quiz-nav {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .quiz-btn {
    background: #e8ecf8;
    color: #174ea6;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.95em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .quiz-btn:hover { background: #d3dbf8; transform: translateY(-2px); }
  .quiz-btn.primary { background: #136f63; color: #fff; }
  .quiz-btn.primary:hover { background: #0f5b52; }
  @media (max-width: 600px) {
    .quiz-container { padding: 25px; }
    .question { font-size: 1.1em; }
    .stars { font-size: 2em; }
  }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h2>Gathering Quantitative Figures – Quiz</h2>
    <div class="progress-text" id="progressText">Question 1 of 10</div>
    <div class="progress-wrapper"><div class="progress-bar" id="progressBar"></div></div>

    <div id="quizBox"></div>
    <button id="nextBtn" class="next-btn" style="display:none;">Next</button>
  </div>

<script>
const quizData = [

{q:"A student records a mass of 25.0 g when the true value is 30.0 g. The measurement is:",c:["Accurate but not precise","Precise but not accurate","Both accurate and precise","Neither accurate nor precise"],a:1,e:"The measurement is consistently off from the true value, indicating precision but not accuracy."},

{q:"Which situation best represents high precision but low accuracy?",c:["Measurements are close to the true value","Measurements are close to each other but far from true value","Measurements vary widely around the true value","Measurements are random"],a:1,e:"Precision refers to consistency, not correctness."},

{q:"Which is most likely a systematic error?",c:["Random fluctuations in readings","A miscalibrated balance","Human estimation error","Environmental variation"],a:1,e:"Systematic errors consistently shift measurements in one direction."},

{q:"Why are repeated measurements useful in experiments?",c:["They eliminate all errors","They increase precision","They guarantee accuracy","They remove systematic errors"],a:1,e:"Repeated measurements improve consistency and reliability."},

{q:"A thermometer consistently reads 2°C higher than actual temperature. This is:",c:["Random error","Systematic error","Human error","Measurement uncertainty"],a:1,e:"A consistent offset indicates systematic error."},

{q:"Which best describes measurement uncertainty?",c:["Mistakes in calculation","The exact value of a measurement","The range within which the true value lies","An error that can be eliminated"],a:2,e:"Uncertainty reflects the limits of measurement precision."},

{q:"Which measurement is the most precise?",c:["10 g","10.0 g","10.00 g","10.000 g"],a:3,e:"More decimal places indicate greater precision."},

{q:"If measurements are both accurate and precise, they are:",c:["Close to each other but far from true value","Far from each other and true value","Close to each other and true value","Randomly distributed"],a:2,e:"Accurate and precise means correct and consistent."},

{q:"Which factor most affects accuracy?",c:["Number of trials","Instrument calibration","Measurement repetition","Data recording speed"],a:1,e:"Calibration ensures measurements are close to the true value."},

{q:"Which situation shows random error?",c:["Scale always reads +5 g","Readings fluctuate slightly around true value","Measurement is consistently low","Instrument is misaligned"],a:1,e:"Random errors vary unpredictably."},

{q:"Why can no measurement be completely exact?",c:["Instruments are always broken","Humans always make mistakes","All measurements have uncertainty","True values do not exist"],a:2,e:"Every measurement has inherent limitations."},

{q:"A student records 5 trials with very similar values, but all are far from the true value. This indicates:",c:["High accuracy, low precision","Low accuracy, high precision","High accuracy and precision","Low accuracy and precision"],a:1,e:"Consistency without correctness indicates precision but not accuracy."},

{q:"Which improvement would most likely increase accuracy?",c:["Repeating measurements","Using a properly calibrated instrument","Taking average values","Recording more decimal places"],a:1,e:"Accuracy depends on correctness relative to true value."},

{q:"Which statement is TRUE about precision?",c:["It ensures correctness","It depends on calibration","It reflects consistency","It eliminates error"],a:2,e:"Precision refers to how close repeated measurements are."}

];

let current = 0, score = 0, selected = null, showingExplanation = false;
const quizBox = document.getElementById("quizBox");
const nextBtn = document.getElementById("nextBtn");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");

function showQuestion() {
  const q = quizData[current];
  updateProgress();
  quizBox.innerHTML = `
    <div class='question'>${q.q}</div>
    <div class='choices'></div>
    <div class='explanation' id='explanationBox'></div>
  `;
  const choicesContainer = quizBox.querySelector(".choices");
  q.c.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = choice;
    btn.addEventListener("click", () => selectChoice(i));
    choicesContainer.appendChild(btn);
  });
  nextBtn.style.display = "none";
  selected = null;
  showingExplanation = false;
}

function selectChoice(i) {
  if (showingExplanation) return;
  selected = i;
  document.querySelectorAll(".choice").forEach((btn, idx) => {
    btn.classList.toggle("selected", idx === i);
    btn.disabled = true;
  });
  const q = quizData[current];
  const expBox = document.getElementById("explanationBox");
  const correct = i === q.a;

  if (correct) score++;

  expBox.innerHTML = `<strong>${correct ? "✅ Correct!" : "❌ Incorrect."}</strong><br>${q.e}`;
  expBox.style.display = "block";
  nextBtn.style.display = "inline-block";
  showingExplanation = true;
}

nextBtn.addEventListener("click", () => {
  current++;
  if (current < quizData.length) showQuestion();
  else showResult();
});

function updateProgress() {
  const percent = (current / quizData.length) * 100;
  progressBar.style.width = percent + "%";
  progressText.textContent = `Question ${current + 1} of ${quizData.length}`;
}

function getStarRating(percent) {
  if (percent === 100) return "⭐️⭐️⭐️";
  else if (percent >= 90) return "⭐️⭐️☆";
  else if (percent >= 80) return "⭐️☆☆";
  else return "☆☆☆";
}

let resultSent = false;

function showResult() {
  progressBar.style.width = "100%";
  progressText.textContent = "Quiz Completed";

  const percent = Math.round((score / quizData.length) * 100);
  const passed = percent >= 80;

  quizBox.innerHTML = `
    <div class='stars'>${getStarRating(percent)}</div>
    <div class='result'>You scored ${score}/${quizData.length} (${percent}%)</div>
    <p id="saveStatus" style="color:#174ea6;font-weight:600;margin-top:10px;">Saving progress...</p>
    <div class='quiz-nav'>
      <button class='quiz-btn' id='backBtn' disabled>⬅ Back</button>
      <button class='quiz-btn' id='retryBtn' disabled>🔁 Retry</button>
      <button class='quiz-btn primary' id='nextLessonBtn' disabled>➡ Next Lesson</button>
    </div>
  `;

  nextBtn.style.display = "none";

  if (!resultSent) {
    resultSent = true;
    window.parent.postMessage({ type: "quizResult", score: percent, passed }, "*");
  }

  setTimeout(() => {
    const status = document.getElementById("saveStatus");
    const backBtn = document.getElementById("backBtn");
    const retryBtn = document.getElementById("retryBtn");
    const nextLessonBtn = document.getElementById("nextLessonBtn");

    if (status) status.textContent = passed
      ? "Progress sent. You may proceed after it is saved."
      : "Attempt recorded. Retake the quiz to unlock the next lesson.";

    if (backBtn) backBtn.disabled = false;
    if (retryBtn) retryBtn.disabled = false;
    if (nextLessonBtn) nextLessonBtn.disabled = !passed;

    if (retryBtn) retryBtn.addEventListener("click", retryQuiz);
    if (backBtn) backBtn.addEventListener("click", () =>
      window.parent.postMessage({ type: "quizBack" }, "*")
    );
    if (nextLessonBtn) nextLessonBtn.addEventListener("click", () => {
      if (passed) window.parent.postMessage({ type: "quizNextLesson" }, "*");
    });
  }, 1200);
}

function retryQuiz() {
  resultSent = false;
  current = 0;
  score = 0;
  showQuestion();
}

showQuestion();
</script>
</body>
</html>
