<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lesson 3 Quiz – Properties of Matter</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #e8f9f1, #f7faff);
  margin: 0;
  padding: 40px 20px;
  display: flex;
  justify-content: center;
}

.quiz-container {
  background: #fff;
  padding: 40px;
  border-radius: 16px;
  max-width: 900px;
  width: 100%;
  text-align: center;
}

h2 { color: #136f63; }

.question {
  font-size: 1.3em;
  margin-bottom: 20px;
  color: #174ea6;
}

.choice {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #e8ecf8;
  cursor: pointer;
}

.choice:hover { background: #d3dbf8; }

.explanation {
  display: none;
  margin-top: 10px;
  background: #eef3ff;
  padding: 12px;
  border-radius: 8px;
  text-align: left;
}

.next-btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: #136f63;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="quiz-container">
<h2>Lesson 3 Quiz: Properties of Matter</h2>
<div id="quizBox"></div>
<button id="nextBtn" class="next-btn" style="display:none;">Next</button>
</div>

<script>

let quizData = [
{q:"Which property can be observed without changing the identity of a substance?",c:["Flammability","Reactivity with acid","Density","Oxidation"],a:2,e:"Density is a physical property and does not change the substance."},

{q:"Burning gasoline is classified as:",c:["Physical property","Chemical property","Intensive property","Extensive property"],a:1,e:"Burning involves a chemical reaction that produces new substances."},

{q:"Which is an intensive property?",c:["Mass","Volume","Density","Length"],a:2,e:"Density does not depend on the amount of substance."},

{q:"Which situation describes a chemical property?",c:["Water boiling at 100°C","Iron rusting in air","Sugar dissolving in water","Copper conducting electricity"],a:1,e:"Rusting involves a chemical change."},

{q:"Which property would change if you cut a substance in half?",c:["Density","Color","Mass","Melting point"],a:2,e:"Mass depends on the amount of substance."},

{q:"A substance has a fixed density regardless of sample size. This property is:",c:["Extensive","Chemical","Intensive","Reactive"],a:2,e:"Density is an intensive property."},

{q:"Which is NOT a physical property?",c:["Boiling point","Color","Reactivity","State"],a:2,e:"Reactivity is a chemical property."},

{q:"Which best explains why density is useful for identification?",c:["It changes with temperature","It depends on mass","It is constant for a substance","It is easy to measure"],a:2,e:"Density is unique and constant for a substance."},

{q:"Which example represents an extensive property?",c:["Temperature","Density","Mass","Color"],a:2,e:"Mass depends on the amount of substance."},

{q:"A metal reacts violently with water. This describes:",c:["Physical property","Chemical property","Intensive property","Extensive property"],a:1,e:"Reactivity is a chemical property."},

{q:"Which scenario shows a physical change rather than a chemical property?",c:["Wood burning","Water freezing","Iron rusting","Gas exploding"],a:1,e:"Freezing does not change chemical identity."},

{q:"Two samples of the same substance have different masses but identical densities. This shows:",c:["Density is extensive","Mass is intensive","Density is intensive","Mass is constant"],a:2,e:"Density remains constant regardless of amount."},

{q:"Which property is most useful for distinguishing between two substances?",c:["Volume","Mass","Density","Shape"],a:2,e:"Density is a characteristic property."}
];

quizData.sort(() => Math.random() - 0.5);

let current=0, score=0, showing=false;
const quizBox=document.getElementById("quizBox");
const nextBtn=document.getElementById("nextBtn");

function showQuestion(){
 const q=quizData[current];
 quizBox.innerHTML=`<div class="question">${q.q}</div><div id="choices"></div><div class="explanation"></div>`;
 const choices=document.getElementById("choices");

 q.c.map((choice, index)=>({choice,index}))
  .sort(()=>Math.random()-0.5)
  .forEach(({choice,index})=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.textContent=choice;
    btn.onclick=()=>selectChoice(index);
    choices.appendChild(btn);
  });

 nextBtn.style.display="none";
 showing=false;
}

function selectChoice(i){
 if(showing) return;
 const q=quizData[current];
 const exp=quizBox.querySelector(".explanation");

 document.querySelectorAll(".choice").forEach(btn=>btn.disabled=true);

 if(i===q.a) score++;

 exp.innerHTML=`<strong>${i===q.a?"✅ Correct":"❌ Incorrect"}</strong><br>${q.e}`;
 exp.style.display="block";
 nextBtn.style.display="inline-block";
 showing=true;
}

nextBtn.onclick=()=>{
 current++;
 if(current<quizData.length) showQuestion();
 else showResult();
};

function showResult(){
 const percent=Math.round(score/quizData.length*100);
 quizBox.innerHTML=`<h3>Score: ${score}/${quizData.length} (${percent}%)</h3>`;
}

showQuestion();

</script>
</body>
</html>
